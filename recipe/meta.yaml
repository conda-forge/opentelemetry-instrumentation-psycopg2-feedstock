{% set name = "opentelemetry-instrumentation-psycopg2" %}
{% set version = "0.62b0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/opentelemetry_instrumentation_psycopg2-{{ version }}.tar.gz
  sha256: c5ed4d271ccaa71b1aecd82c892090715d3bb8d8c7d7a4ae77dc2b685f72fcc6

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - psycopg2
    - python >={{ python_min }}
    - opentelemetry-api ~=1.12
    - opentelemetry-instrumentation ==0.62b0
    - opentelemetry-instrumentation-dbapi ==0.62b0
    # - psycopg2 >=2.7.3.1

test:
  imports:
    - opentelemetry
    - opentelemetry.instrumentation
    - opentelemetry.instrumentation.psycopg2
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip
    - psycopg2-binary >=2.7.3.1

about:
  summary: OpenTelemetry psycopg2 instrumentation
  home: https://github.com/open-telemetry/opentelemetry-python-contrib/tree/main/instrumentation/opentelemetry-instrumentation-psycopg2
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - conda-forge/opentelemetry-api
    - mariusvniekerk
    - rxm7706
